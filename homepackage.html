<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobeTrek | All Expeditions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 CSS & JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .coun-btn { cursor: pointer; white-space: nowrap; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="p-6 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
        <a href="home.html" class="text-2xl font-bold text-blue-900">Globe<span class="text-emerald-500">Trek</span></a>
        <div class="flex gap-4">
            <input type="text" id="packageSearch" placeholder="Search destinations..." 
                   class="px-4 py-2 bg-gray-100 rounded-xl text-sm outline-none w-64 border focus:border-emerald-500">
            <a href="home.html" class="bg-orange-600 hover:bg-blue-800 px-6 py-2 rounded-full text-sm font-medium text-white transition">
                Back to Home
            </a>
        </div>
    </nav>

    <section class="py-12 px-12 max-w-7xl mx-auto">
        <header class="mb-12">

            <p class="text-gray-500 mt-2">Discover our full collection of world-class journeys.</p>
        </header>

        <div class="flex gap-3 mb-10 overflow-x-auto pb-4 no-scrollbar" id="filterButtons">
            <button onclick="displayFirebasePackages('all')" class="coun-btn p-3 px-5 rounded-xl transition-all text-sm bg-blue-900 text-white font-bold border border-blue-100">All</button>  
            <button onclick="displayFirebasePackages('Srilanka')" class="coun-btn p-3 px-5 rounded-xl transition-all text-sm bg-white text-gray-600 border border-gray-100">Srilanka</button>

            <button onclick="displayFirebasePackages('Arab Emirates')" class="coun-btn p-3 px-5 rounded-xl transition-all text-sm bg-white text-gray-600 border border-gray-100">Arab Emirates</button>            
            <button onclick="displayFirebasePackages('Switzerland')" class="coun-btn p-3 px-5 rounded-xl transition-all text-sm bg-white text-gray-600 border border-gray-100">Switzerland</button>            
            <button onclick="displayFirebasePackages('Australia')" class="coun-btn p-3 px-5 rounded-xl transition-all text-sm bg-white text-gray-600 border border-gray-100">Austarlia</button>

            <button onclick="displayFirebasePackages('Indonesia')" class="coun-btn p-3 px-5 rounded-xl transition-all text-sm bg-white text-gray-600 border border-gray-100">Indonesia</button>

            </div>

        <div id="allPackagesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20">
                <p class="text-gray-400 animate-pulse text-lg">Loading packages...</p>
            </div>
        </div>
    </section>

    <script type="module" src="../js/homepackages.js"></script>
</body>
</html>
