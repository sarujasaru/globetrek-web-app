<div class="p-8 bg-slate-50 min-h-screen">
    <header class="mb-10 flex justify-between items-center">
        <div>
            <h1 class="font-headline text-6xl font-bold text-gt-blue leading-tight mb-4">Concierge Support</h1>
            <p class="text-gray-500">Managing your bespoke inquiries and expedition requests.</p>
        </div>
        <div class="bg-teal-50 px-4 py-2 rounded-full border border-teal-100 flex items-center gap-2">
            <span class="w-2 h-2 bg-teal-500 rounded-full animate-pulse"></span>
            <span class="text-xs font-bold text-teal-800 uppercase">Average Response: 12m</span>
        </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
        <div class="xl:col-span-2 space-y-6">
            <h2 class="text-xl font-bold text-slate-900">Inquiry History</h2>
            
            <div id="inquiryHistoryContainer" class="space-y-6">
                <p class="text-gray-400 text-center py-10">Loading your inquiry history...</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm h-fit">
            <h2 class="text-xl font-bold text-slate-900 mb-6">New Inquiry</h2>
            <form onsubmit="submitInquiry(event)" class="space-y-4">
    <div>
        <label class="text-[10px] font-bold text-gray-400 uppercase">Inquiry Subject</label>
        <input type="text" id="query-subject" placeholder="Subject" required class="w-full bg-slate-50 p-4 rounded-2xl border border-gray-100 mt-1 h-32 focus:outline-none">
    </div>
    <div>
        <label class="text-[10px] font-bold text-gray-400 uppercase">Your Message</label>
        <textarea id="query-message" placeholder="Your Message" required class="w-full bg-slate-50 p-4 rounded-2xl border border-gray-100 mt-1 h-32 focus:outline-none"></textarea>
    </div>
    <button type="submit" onclick="submitInquiry(event)" class="w-full bg-orange-600 text-white font-bold py-4 rounded-2xl hover:bg-orange-700 transition">
        Send Inquiry
    </button>
</form>
        </div>
    </div>
</div>
