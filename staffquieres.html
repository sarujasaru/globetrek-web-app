<div class="p-8 bg-slate-50 min-h-screen">
    <header class="mb-8">
        <h1 class="font-headline text-6xl font-bold text-gt-blue leading-tight mb-4">Customer Queries</h1>
        <p id="query-count-text" class="text-gray-500 text-sm mt-1">Loading inquiries...</p>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
        <div id="queries-list-container" class="xl:col-span-2 space-y-6">
            <p class="text-gray-400 animate-pulse">Fetching latest queries...</p>
        </div>

        <div class="bg-white p-8 rounded-[2rem] border border-gray-100 shadow-sm h-fit sticky top-24">
            <h2 class="text-lg font-bold text-gt-blue mb-4">Response Module</h2>
            <div class="space-y-4">
                <input type="text" id="reply-to" placeholder="TO: Select a query" class="w-full p-3 bg-gray-50 rounded-xl text-sm border border-gray-100" readonly>
                <input type="text" id="reply-subject" placeholder="SUBJECT:" class="w-full p-3 bg-gray-50 rounded-xl text-sm border border-gray-100">
                <textarea id="reply-message" rows="6" class="w-full p-4 bg-gray-50 rounded-xl text-sm border border-gray-100" placeholder="Type your reply here..."></textarea>
                <button onclick="sendStaffReply()" class="w-full bg-orange-600 text-white py-3 rounded-2xl font-bold text-sm hover:bg-orange-700 transition-all">Send Reply</button>
            </div>
            <input type="hidden" id="current-query-id">
        </div>
    </div>
</div>
