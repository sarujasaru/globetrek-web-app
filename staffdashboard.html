<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency Dashboard | GlobeTrek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 CSS & JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'gt-orange': '#f97316', 'gt-blue': '#1e3a8a', 'gt-dark-blue': '#172554' } }, fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'headline': ['Volkhov', 'serif']
                    } }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body class="bg-gray-50 flex min-h-screen">
<div class="hidden bg-blue-50 bg-orange-50 bg-emerald-50 bg-purple-50 text-blue-600 text-orange-600 text-emerald-600 text-purple-600 bg-blue-100 bg-orange-100 bg-emerald-100 bg-purple-100"></div>
   <aside class="w-64 bg-white border-r h-screen p-8 fixed left-0 top-0 flex flex-col justify-between">
    <div>
        <div class="flex items-center gap-2 mb-12">
            <img src="https://img.pikbest.com/origin/09/22/51/59JpIkbEsTVCG.png!sw800" alt="GlobeTrek Logo" class="w-10 h-10 object-contain">
            <div>
                <div class="text-gt-blue font-bold text-xl leading-none">GlobeTrek</div>
                <div class="text-xs text-gray-400">Agency Dashboard</div>
            </div>
        </div>
   
       <nav class="space-y-3">
    <!-- கவனிப்பு: setActive-க்குள் இருக்கும் பெயரும் id-யும் ஒன்றாக இருக்க வேண்டும் -->
    <button id="dashboard" onclick="showDashboard(); setActive('nav-dashboard')" class="nav-btn flex w-full items-center gap-3.5 p-3 rounded-xl transition-all text-sm text-gray-500">
        Dashboard
    </button>
    <button id="booking" onclick="loadBooking(); setActive('nav-booking')" class="nav-btn flex w-full items-center gap-3.5 p-3 rounded-xl transition-all text-sm text-gray-500">
        Bookings
    </button>
    <button id="package" onclick="loadPackage(); setActive('nav-package')" class="nav-btn flex w-full items-center gap-3.5 p-3 rounded-xl transition-all text-sm text-gray-500">
        Travel Packages
    </button>
    <button id="queries" onclick="loadQueries(); setActive('nav-queries')" class="nav-btn flex w-full items-center gap-3.5 p-3 rounded-xl transition-all text-sm text-gray-500">
        Customer Queries
    </button>
</nav>
    </div>
    
    <div class="space-y-4">
       
        <button id="logoutBtn" class="flex items-center gap-3 text-gray-500 text-sm hover:text-red-600 w-full p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg> Logout
        </button>
    </div>
</aside>

<nav class="fixed top-0 left-64 right-0 z-50 px-8 py-4 bg-white/70 backdrop-blur-md border-b border-white/20 flex justify-between items-center">
    <div class="relative w-96">
        <input type="text" placeholder="Search operations, users, settings..." 
               class="w-full pl-10 pr-4 py-2.5 rounded-2xl bg-white/50 border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        <svg class="absolute left-3 top-3 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </div>

    <div class="flex items-center gap-6">
        <button class="relative p-2 text-gray-500 hover:text-gt-blue transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <div class="flex items-center gap-3 pl-6 border-l border-gray-200">
            <div class="text-right">
                <p class="text-sm font-bold text-gt-blue">Staff</p>
                <p class="text-[10px] text-gray-400 uppercase">System Root</p>
            </div>
            <img src="https://i.pravatar.cc/40?u=admin" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
        </div>
    </div>
</nav>

    <main id="main-content" class="flex-1 ml-64 p-10 xl:p-14">
        <div id="dashboard-view">
        <header class="flex justify-between items-center mb-10">
            
        </header>

        <div class="bg-gt-blue text-white p-10 min-h-[280px] rounded-3xl mb-10 relative overflow-hidden" 
     style="background-image: url('https://science.nasa.gov/wp-content/uploads/2022/05/stargazing-banner-2.jpg?w=1041'); background-size: cover; background-position: center;">
    
    <div class="absolute inset-0 bg-gt-blue opacity-10"></div>

   <div class="relative z-10">
    <h2 class="text-3xl font-bold mb-2">Welcome back to the Expedition Desk.</h2>
    <p class="text-blue-200">
        You have <span id="pendingCountDisplay" class="font-bold text-white">0</span> pending bookings 
        and <span id="queryCountDisplay" class="font-bold text-white">0</span> unread queries.
    </p>
</div>
</div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 space-y-8">
                <div class="bg-white p-6 rounded-[2.5rem] border border-gt-border shadow-sm">
    <h3 class="text-xl font-bold text-gt-blue mb-4">Trending Destinations</h3>
    <!-- இங்கே தான் டைனமிக் தரவு வந்து சேரும் -->
    <div id="hotspotContainer" class="space-y-4">
        <p class="text-gray-400 text-sm animate-pulse">Loading hotspots...</p>
    </div>
</div>
                <div class="bg-white p-6 rounded-[2.5rem] border border-gt-border shadow-sm">
    <h3 class="text-xl font-bold text-gt-blue mb-4">Monthly Booking Analytics</h3>
    <div style="height: 300px;">
        <canvas id="bookingChart"></canvas>
    </div>
</div>
            </div>

            <aside id="queryInboxContainer" class="bg-gt-dark-blue text-white p-8 rounded-3xl h-[600px] overflow-y-auto">
                <h3 class="font-bold text-lg mb-6">Query Inbox</h3>
                <div id="queryInbox" class="space-y-4"></div>
            </aside>
        </div>
        
    </main>

    <script type="module" src="../js/firebase.js"></script>
    <script type="module" src="../js/package-editor.js"></script>
    <script type="module" src="../js/staffbooking.js"></script>
     <script type="module" src="../js/staffdashboard.js"></script>

</body>
</html>
