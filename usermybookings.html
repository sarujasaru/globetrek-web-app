<div class="animate-in fade-in duration-500 p-6 md:p-10">
    <header class="mb-10">
        <h1 class="font-headline text-6xl font-bold text-gt-blue leading-tight mb-4">My Bookings</h1>
        <p class="text-gray-500 font-medium tracking-wide">YOUR JOURNEY THROUGH THE CURATED EXPEDITION</p>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
    <div id="latestBookingHighlight" class="xl:col-span-2">
        <div class="bg-white p-8 rounded-[2.5rem] border border-dashed border-gray-200 flex items-center justify-center min-h-[350px]">
            <p class="text-gray-400">Loading latest journey...</p>
        </div>
    </div>

    <div class="bg-gt-blue text-white p-8 rounded-[2.5rem] shadow-xl flex flex-col justify-between min-h-[280px]">
    <div id="milestoneContent">
        <p class="text-blue-300 text-xs font-bold uppercase mb-2">Travel Milestones</p>
        
        <h3 id="bookingCount" class="text-6xl font-bold">00</h3> 
        
        <p class="text-blue-200">Expeditions Completed</p>
        
        </div>
    <p class="italic text-blue-100/80 text-sm">"Adventure is not outside man; it is within."</p>
</div>
</div>

<section class="mt-12">
    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-6">Your Previous Bookings</h2>
    <div id="bookingsGrid" class="space-y-6">
    </div>
</section>
