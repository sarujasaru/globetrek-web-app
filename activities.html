<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Audit Log | GlobeTrek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 CSS & JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'jakarta': ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        'gt-blue': '#1e3a8a',
                        'gt-dark': '#0f172a',
                        'gt-bg': '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-7xl mx-auto px-4 py-10 md:px-10">
        
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-gt-dark tracking-tight">System Audit Log</h1>
                <p class="text-slate-500 mt-1 font-medium">Monitoring platform activities in real-time.</p>
            </div>
            <button onclick="window.history.back()" 
                    class="group flex items-center gap-2 px-6 py-3 bg-white border border-slate-200 hover:border-gt-blue hover:text-gt-blue rounded-2xl text-sm font-bold shadow-sm transition-all duration-300">
                <svg class="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Dashboard
            </button>
        </div>

        <!-- Activity Card -->
        <div class="bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 overflow-hidden">
            
            <!-- Table Header & Search -->
            <div class="p-8 md:p-10 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-6">
                <h2 class="text-2xl font-bold text-gt-dark">Activity History</h2>
                <div class="relative w-full md:w-96">
                    <input type="text" id="activitySearch" 
                           placeholder="Search by customer or package..." 
                           class="w-full pl-12 pr-6 py-4 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-gt-blue/20 transition-all outline-none">
                    <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <!-- Enhanced Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50 text-slate-400 text-[11px] uppercase tracking-[0.15em] font-bold">
                            <th class="py-5 px-10">Category</th>
                            <th class="py-5 px-6">Package Details</th>
                            <th class="py-5 px-6">Customer & Revenue</th>
                            <th class="py-5 px-10">Status & Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="full-activity-table-body" class="text-sm divide-y divide-slate-50">
                        <!-- Data will be loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    
    <script type="module" src="firebase.js"></script>
    <script type="module" src="../js/admindashboard.js"></script>
    <script type="module" src="../js/activities.js"></script>
</body>
</html>
